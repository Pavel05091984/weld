<html>
  <head>
    <script src="js/aframe.min.js"></script>
    <script src="js/aframe-event-set-component.min.js"></script>
    <script src="js/aframe-extras.min.js"></script>
    <script src="js/aframe-environment-component.min.js"></script>
    <title>Тестирование для примера</title>
  </head>
  <body>
    <a-assets>
      <a-asset-item
        id="stela_tihvin"
        src="assets/stela_tihvin.gltf"
      ></a-asset-item>
    </a-assets>
    <a-scene>
      <a-entity
          id="Стелла"
          position="-0.33 0.4 -3.8"
          rotation="0 0 0"
          scale="0.05 0.05 0.05"
          gltf-model="#stela_tihvin"
          animation="property: scale; to: 0.15 0.15 0.15; dir: alternate;  dur: 500; easing: linear; loop: false; startEvents: mouseenter"
          animation__mouseleave="property: scale; to: 0.05 0.05 0.05; dir: alternate;  dur: 500; easing: linear; loop: false; startEvents: mouseleave"
        >
        </a-entity>
      <a-entity
        environment=" preset : default ; dressingAmount: 5; skyType: atmosphere;  "
      >
        <a-camera position="0 1.6 0">
          <a-cursor color="black"></a-cursor> </a-camera
      ></a-entity>
    </a-scene>
  </body>
</html>
