<html>
  <head>
    <script src="js/aframe.min.js"></script>
    <script src="js/aframe-event-set-component.min.js"></script>
    <script src="js/aframe-extras.min.js"></script>
    <script src="js/aframe-environment-component.min.js"></script>
    <title>Тестирование для примера</title>
  </head>
  <body>
    <a-assets>
      <a-asset-item
        id="stela_tihvin"
        src="assets/stela_tihvin.gltf"
      ></a-asset-item>
    </a-assets>
    <a-scene>
      <a-entity
          id="Стелла"
          position="0 0 -4"
          rotation="0 0 0"
          scale="1 1 1"
          gltf-model="#stela_tihvin"
        >
        </a-entity>
      <a-entity
        environment=" preset : default ; dressingAmount: 5; skyType: atmosphere;  "
      >
       <a-entity id="Player_1" position="0 1.6 1">
        <a-entity
          camera
          look-controls
          wasd-controls="acceleration: 15; maxVelocity: 8"
        >
        </a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
